version: '3.8'

services:
  backend:
    image: shahfaheem2026/ecommerce-backend:v1
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    networks:
      - ecommerce-network

  frontend:
    image: shahfaheem2026/ecommerce-frontend:v1
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

  admin:
    image: shahfaheem2026/ecommerce-admin:v1
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
